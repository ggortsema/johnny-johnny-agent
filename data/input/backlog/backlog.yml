- id: kharon-v1-ai-knowledge-assistant
  type: epic
  title: Kharon V1 - AI Knowledge Assistant
  repository: ggortsema/styxcd-docs
  status: OPEN
  order: 5000
  description: "## Goal\n\nBuild the first production-quality version of **Kharon**, the AI knowledge assistant for StyxCD.\n\
    \nKharon is an independent Python service responsible for retrieval, reasoning,\nknowledge ingestion, and AI interactions.\
    \ StyxCD remains the deterministic\ndeployment platform while Kharon provides AI-assisted capabilities.\n\n**Guiding Principle**\n\
    \n> StyxCD authorizes.  \n> Kharon advises.\n\n---\n\n# Success Criteria\n\n- Standalone Python service\n- Chat endpoint\
    \ operational\n- RAG implemented using StyxCD documentation\n- PostgreSQL + pgvector knowledge store\n- LangChain and\
    \ LangGraph integrated\n- Able to answer StyxCD-specific questions using retrieved documentation\n\n---"
