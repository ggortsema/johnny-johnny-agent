      project_id: PVT_example

epics:
  - id: project-management-workflow-provider
    type: epic
    title: Project Management Workflow Provider
    repository: ggortsema/styxcd-docs
    status: OPEN
    order: 1000
    description: |
      Implement a provider-neutral project-management workflow system.
    acceptance_criteria:
      - Define a canonical backlog YAML format.
      - Support provider metadata without making provider IDs semantic identity.
      - Preserve enough metadata to reconcile with GitHub Projects.
    labels:
      - platform
      - backlog
    assignees:
      - ggortsema
    milestone: Backlog v1
    provider_metadata:
      github:
        issue_id: I_example
        project_item_id: PVTI_example
        database_id: 123456
        number: 283
        url: https://github.com/ggortsema/styxcd-docs/issues/283
    issues:
      - id: define-pm-workflow-dsl
        type: issue
        title: Define PM Workflow DSL
        repository: ggortsema/styxcd-docs
        status: OPEN
        order: 1000
        description: |
          Define the portable YAML structure for project-management workflows.
        acceptance_criteria:
          - Epics and issues can be represented.
          - Provider metadata is isolated under provider_metadata.
          - Stable Johnny-Johnny IDs are used as semantic identity.
        labels:
          - design
        assignees:
          - ggortsema
        milestone: Backlog v1
        provider_metadata:
          github:
            issue_id: I_child_example
            project_item_id: PVTI_child_example
            database_id: 123457
            number: 284
            url: https://github.com/ggortsema/styxcd-docs/issues/284

      - id: implement-github-issues-provider
        type: issue
        title: Implement GitHub Issues Provider
        repository: ggortsema/styxcd-docs
        status: OPEN
        order: 2000
        description: |
          Implement the first provider integration using GitHub Issues and GitHub Projects.
        acceptance_criteria:
          - GitHub issues can be created from canonical backlog YAML.
          - GitHub project items can be associated with created issues.
          - Repeated execution is safe and idempotent.
        labels:
          - github
          - integration
        assignees: []
        milestone: Backlog v1
        provider_metadata:
          github:
            issue_id: I_second_child_example
            project_item_id: PVTI_second_child_example
            database_id: 123458
            number: 285
            url: https://github.com/ggortsema/styxcd-docs/issues/285